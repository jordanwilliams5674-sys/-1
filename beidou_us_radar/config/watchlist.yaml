module: premarket_mover_radar
timezone:
  beijing: Asia/Shanghai
  eastern: America/New_York

scan_times_beijing:
  - "15:30"
  - "16:05"
  - "20:30"
  - "21:20"

scan_universe:
  include_nasdaq100: true
  include_watchlists: true
  include_market_movers: true
  nasdaq100_cache_file: "config/nasdaq100_symbols.txt"
  nasdaq100_cache_hours: 24
  note: "默认扫描范围 = Nasdaq 100 + 实际持仓研究标签 + 观察池 + 全市场异动候选；不保存数量、成本、账户或券商信息。"

notification:
  email_to: "295765031@qq.com"
  desktop_enabled: true
  email_enabled: false
  telegram_enabled: false
  pushplus_enabled: false
  serverchan_enabled: false

thresholds:
  strong_score: 80
  watch_score: 65
  only_watch_score: 50
  strong_premarket_percent: 6
  watch_premarket_percent: 3
  min_useful_premarket_volume: 50000
  max_reasonable_spread_percent: 3

important_messages:
  pin_minutes: 90
  allow_more_than_three: true
  record_history: true
  active_record_file: "reports/premarket/important/important_records.json"
  history_jsonl: "reports/premarket/important/important_records.jsonl"
  daily_markdown: "reports/premarket/important/YYYY-MM-DD_important.md"
  note: "重要消息保留约90分钟；页面合并展示，不铺满多个重复卡片；普通候选继续实时刷新，错过可看重要消息记录。"

