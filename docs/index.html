<body>
  <main class="page">
    <div class="topbar">
      <div><h1>北斗投研雷达</h1><p class="muted">投资事件雷达 + 标的分层 + 资料沉淀系统</p></div>
      <div class="symbolLine" id="topMeta"></div>
    </div>
    <section class="panel overview" id="overview"></section>
    <section class="section"><div class="head"><h2>今日最重要事件</h2><span class="tag yellow">3-5 条</span></div><div class="eventGrid" id="topEvents"></div></section>
    <section class="section"><div class="head"><h2>重点标的</h2><span class="tag blue">北斗关注权重</span></div><div class="focusGrid" id="focusSymbols"></div></section>
    <div class="disclaimer" id="disclaimer"></div>
    <section class="section"><div class="head"><h2>观察池</h2><span class="tag gray">唯一分层</span></div><div class="watchGrid" id="watchPool"></div></section>
    <section class="section"><div class="head"><h2>研究池</h2><span class="tag green">主题资料</span></div><div class="researchGrid" id="researchPool"></div></section>
    <section class="section"><div class="head"><h2>事件雷达</h2><span class="tag yellow">按事件，不堆股票</span></div><div class="radarList" id="eventRadar"></div></section>
    <section class="section"><div class="head"><h2>资料库</h2><span class="tag blue">北斗 / 七星资料</span></div><div class="libraryList" id="library"></div></section>
    <section class="section"><div class="head"><h2>风险提醒</h2><span class="tag red">先核验</span></div><div class="riskList" id="risks"></div></section>
  </main>
  <script>
    const esc=v=>String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const el=id=>document.getElementById(id),tag=(txt,cls='')=>`<span class="tag ${cls}">${esc(txt)}</span>`,tags=(arr,cls='')=>(arr||[]).filter(Boolean).slice(0,8).map(x=>tag(x,cls)).join('');
    const tone=x=>x==='利好'?'good':x==='利空'?'bad':'',toneTag=x=>x==='利好'?tag(x,'green'):x==='利空'?tag(x,'red'):['待核验','待确认','社媒线索','历史样本'].includes(x)?tag(x,'yellow'):tag(x,'gray');
    const kv=rows=>`<div class="kv">${rows.map(([k,v])=>`<span>${esc(k)}</span><span>${esc(v||'-')}</span>`).join('')}</div>`,empty=text=>`<div class="empty">${esc(text)}</div>`;
    let refreshTimer=null,refreshing=false;
    function scanLabel(scan){if(!scan)return'扫描状态待确认';if(scan.running)return'正在更新事件';if(scan.scan_enabled===false)return'自动扫描关闭';return'自动扫描开启'}
    async function refreshNow(){if(refreshing)return;refreshing=true;const btn=document.getElementById('refreshBtn');if(btn){btn.disabled=true;btn.textContent='更新中'}try{throw new Error('静态网站不支持在线刷新，请更新数据后重新导出。');setTimeout(()=>main().catch(showError),2500)}catch(err){showError(err)}finally{setTimeout(()=>{refreshing=false},3000)}}
    function renderOverview(data){const o=data.overview||{};el('overview').innerHTML=`<div><div class="head"><div><h2>今日北斗总览</h2><p class="muted">更新时间：${esc(o.updatedAt||'-')}</p></div>${tag('研究模式','blue')}</div><div class="conclusion">${esc(o.beidouConclusion||'等待数据')}</div><div class="symbolLine">${tags(o.keySymbols,'blue')}</div></div><div class="metricGrid"><div class="metric"><span class="muted">市场温度</span><b>${esc(o.marketTemperature||'-')}</b></div><div class="metric"><span class="muted">AI 半导体景气</span><b>${esc(o.aiSemiCycle||'-')}</b></div><div class="metric"><span class="muted">风险偏好</span><b>${esc(o.riskAppetite||'-')}</b></div><div class="metric" style="grid-column:1/-1"><span class="muted">今日重点事件</span><b>${esc(o.topEvent||'-')}</b></div></div>`}
    function renderTopEvents(rows){el('topEvents').innerHTML=rows?.length?rows.map(e=>`<article class="card eventCard ${tone(e.impactDirection)}"><div class="head"><h3>${esc(e.eventTitle)}</h3>${toneTag(e.impactDirection)}</div><div class="symbolLine">${tags(e.relatedSymbols,'blue')}</div>${kv([['事件时间',e.eventTime],['来源',e.source],['来源状态',e.sourceStatus],['时效状态',e.expiryStatus]])}<p class="muted" style="margin-top:8px">${esc(e.beidouJudgement)}</p><p class="muted" style="margin-top:6px">北斗倾向：${esc(e.actionMeaning)}</p></article>`).join(''):empty('暂无可进入首页的重点事件。')}
    function renderFocus(rows){el('focusSymbols').innerHTML=rows?.length?rows.map(s=>`<article class="card focusCard"><div class="focusTop"><div><div class="symbol">${esc(s.symbol)}</div><div class="name">${esc(s.name)} - ${esc(s.theme)}</div></div><div class="weight"><span class="muted">北斗关注权重</span><strong>${esc(s.focusWeight)}</strong></div></div><div class="bar"><span style="width:${Math.max(0,Math.min(100,Number(s.focusWeight)||0))}%"></span></div><div class="symbolLine">${tag(s.beidouStatus,'blue')}${toneTag(s.impactDirection)}${toneTag(s.sourceStatus)}</div><h3 style="margin-top:10px">${esc(s.latestEvent)}</h3>${kv([['事件时间',s.eventTime],['时效状态',s.expiryStatus||s.sourceStatus],['北斗倾向',s.actionBias],['风险提示',s.riskNote]])}</article>`).join(''):empty('暂无重点标的。')}
    function renderWatch(rows){el('watchPool').innerHTML=rows?.length?rows.map(s=>`<article class="card watchCard ${s.currentStatus==='暂停/冷却'?'cool':''}"><div class="head"><div><h3>${esc(s.symbol)} - ${esc(s.name)}</h3><p class="muted">${esc(s.theme)}</p></div>${tag(s.currentStatus,s.currentStatus==='暂停/冷却'?'gray':'green')}</div><p class="muted">${esc(s.watchReason)}</p>${kv([['升级条件',s.upgradeTrigger],['更新时间',s.updatedAt]])}</article>`).join(''):empty('暂无观察池项目。')}
    function renderResearch(rows){el('researchPool').innerHTML=rows?.length?rows.map(r=>`<article class="card researchCard"><div class="head"><h3>${esc(r.topic)}</h3>${tag(r.sourceType,'gray')}</div><div class="symbolLine">${tags(r.relatedSymbols,'green')}</div><p class="muted" style="margin-top:8px">${esc(r.researchReason)}</p>${kv([['北斗结论',r.beidouConclusion],['下一步动作',r.nextAction],['更新时间',r.updatedAt]])}</article>`).join(''):empty('暂无研究池主题。')}
    function renderRadar(rows){el('eventRadar').innerHTML=rows?.length?rows.map(e=>`<article class="radarRow"><div><h3>${esc(e.eventTitle)}</h3><p class="muted">${esc(e.beidouJudgement)}</p></div><div>${toneTag(e.impactDirection)} ${toneTag(e.sourceStatus)} ${toneTag(e.expiryStatus)}<div class="symbolLine">${tags(e.relatedSymbols,'blue')}</div></div>${kv([['事件时间',e.eventTime],['来源',e.source],['更新时间',e.updatedAt]])}</article>`).join(''):empty('暂无事件雷达内容。')}
    function renderLibrary(rows){el('library').innerHTML=rows?.length?rows.map(f=>`<article class="libraryRow"><div><h3>${f.url?`<a href="${esc(f.url)}" target="_blank" rel="noreferrer">${esc(f.title)}</a>`:esc(f.title)}</h3><p class="muted">${esc(f.oneLineConclusion)}</p></div><div>${tag(f.beidouAbsorbStatus,'blue')}<p class="muted" style="margin-top:8px">${esc(f.category)}</p></div>${kv([['最后更新',f.lastUpdated],['原始文件',f.fileName]])}</article>`).join(''):empty('暂无资料库内容。')}
    function renderRisks(rows){el('risks').innerHTML=rows?.length?rows.map(r=>`<article class="riskRow"><div><h3>${esc(r.riskTitle)}</h3><div class="symbolLine">${tags(r.affectedSymbols,'yellow')}</div></div><div>${tag(r.riskLevel,'yellow')}</div><div><p class="muted">${esc(r.riskReason)}</p>${kv([['北斗动作',r.beidouAction],['更新时间',r.updatedAt]])}</div></article>`).join(''):empty('暂无风险提醒。')}
    async function main(){const res=await fetch('api/webdata.json?ts='+Date.now());const raw=await res.json();const data=raw.homeV1||{},scan=raw.status?.scan||{};el('topMeta').innerHTML=tag(raw.market?.sessionLabel||'状态待确认','gray')+tag(scanLabel(scan),scan.running?'yellow':scan.scan_enabled===false?'red':'green')+tag(`快照 ${raw.market?.beijingTime||'-'}`,'blue')+'<button class="tag blue" id="refreshBtn" onclick="refreshNow()" title="静态网站不支持在线刷新，请更新数据后重新导出。">立即更新</button>';renderOverview(data);renderTopEvents(data.topEvents);renderFocus(data.focusSymbols);el('disclaimer').textContent=data.disclaimer||'';renderWatch(data.watchPool);renderResearch(data.researchPool);renderRadar(data.eventRadar);renderLibrary(data.library);renderRisks(data.risks);const seconds=Number(raw.market?.refreshPolicy?.intervalSeconds||300);if(refreshTimer)clearTimeout(refreshTimer);refreshTimer=setTimeout(()=>main().catch(showError),(scan.running?15:Math.max(30,seconds))*1000)}
    function showError(err){document.body.innerHTML=`<pre style="white-space:pre-wrap;color:white;padding:20px">${esc(err.stack||err)}</pre>`}
    main().catch(showError);
  </script>
